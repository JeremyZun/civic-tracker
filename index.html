<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Tracker | 企業級陳情追蹤系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="container nav-content">
            <h1 class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                Civic Tracker
            </h1>
            <div class="nav-stats">
                <span>總案件 <b id="stat-total" class="badge-neutral">0</b></span>
                <span>處理中 <b id="stat-processing" class="badge-warning">0</b></span>
            </div>
            <button id="btn-open-add" class="btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                新增案件
            </button>
        </div>
    </header>

    <main class="container">
        <div class="calendar-header">
            <button id="btn-prev-month" class="btn-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
            <h2 id="current-month-year" class="month-title">2026年 3月</h2>
            <button id="btn-next-month" class="btn-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
        </div>

        <div class="calendar-card">
            <div class="weekdays">
                <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
            </div>
            <div id="calendar-days" class="days-grid">
                </div>
        </div>
    </main>

    <div id="modal-add" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>新增陳情專案</h2>
                <button class="close-btn" onclick="closeModal('modal-add')">&times;</button>
            </div>
            <form id="form-add-case" class="modal-body">
                <div class="form-group">
                    <label>專案主旨</label>
                    <input type="text" id="input-title" required placeholder="例如：安居街水溝蓋修繕工程">
                </div>
                <div class="form-group">
                    <label>負責單位 / 陳情對象</label>
                    <input type="text" id="input-target" required placeholder="例如：台北市政府新工處 / 1999">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>立案日期</label>
                        <input type="date" id="input-submit-date" required>
                    </div>
                    <div class="form-group">
                        <label>預估結案/回覆日</label>
                        <input type="date" id="input-reply-date" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>專案內容描述</label>
                    <textarea id="input-content" rows="5" required placeholder="請詳細描述案件狀況..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal('modal-add')">取消</button>
                    <button type="submit" class="btn-primary">建立專案</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-day-cases" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h2 id="day-modal-title">日期紀錄</h2>
                <button class="close-btn" onclick="closeModal('modal-day-cases')">&times;</button>
            </div>
            <div class="modal-body">
                <div id="day-cases-list" class="cases-list-container">
                    </div>
            </div>
            <div class="modal-footer" style="justify-content: flex-start;">
                <button id="btn-add-on-this-day" class="btn-outline">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 5px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    於此日期新增專案
                </button>
            </div>
        </div>
    </div>

    <div id="modal-reply" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>更新專案進度</h2>
                <button class="close-btn" onclick="closeModal('modal-reply')">&times;</button>
            </div>
            <form id="form-reply-case" class="modal-body">
                <input type="hidden" id="edit-case-id"> 
                
                <div class="form-row">
                    <div class="form-group" style="flex: 1;">
                        <label>當前狀態</label>
                        <select id="edit-status">
                            <option value="processing">進行中 (Processing)</option>
                            <option value="replied">已回覆 (Replied)</option>
                            <option value="closed">已結案 (Closed)</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>預估結案/回覆日 (可展延)</label>
                        <input type="date" id="edit-reply-date" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>官方回覆紀錄</label>
                    <textarea id="edit-reply-content" rows="6" placeholder="貼上官方回信或最新進度說明..."></textarea>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal('modal-reply')">取消</button>
                    <button type="submit" class="btn-success">儲存變更</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
